<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloqr AI — app.bloqr.dev</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg-base); color: var(--fg-1); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100%; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 9999px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Compiler.jsx"></script>
<script type="text/babel">
  function App() {
    const [route, setRoute] = React.useState('dashboard');
    React.useEffect(() => { window.scrollTo(0, 0); }, [route]);
    return (
      <window.AppShell route={route} setRoute={setRoute}>
        {route === 'dashboard' && <window.DashboardScreen setRoute={setRoute} />}
        {route === 'compiler' && <window.CompilerScreen />}
      </window.AppShell>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
