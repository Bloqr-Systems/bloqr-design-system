<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:28px 24px;font-family:var(--font-display);display:flex;align-items:center;gap:40px}
  .lock{display:flex;align-items:center;gap:14px}
  .mark{display:flex;flex-direction:column;gap:5px}
  .bar{height:6px;border-radius:3px}
  .name{font-weight:700;font-size:30px;letter-spacing:-0.01em;color:var(--fg-1)}
  .sub{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);line-height:1.7}
</style></head><body>
  <div class="lock">
    <div class="mark">
      <div class="bar" style="width:44px;background:#F1F5F9"></div>
      <div class="bar" style="width:32px;background:#00D4FF"></div>
      <div class="bar" style="width:20px;background:#FF5500"></div>
    </div>
    <div><div class="name">Bloqr</div><div class="sub">Internet Hygiene · Automated</div></div>
  </div>
  <div class="meta">Always “Bloqr” — never BLOQR, bloqr, BloQr.<br>Min mark height 24px. Never recolor or reorder.<br>Bars read as a filter / signal meter.</div>
</body></html>
