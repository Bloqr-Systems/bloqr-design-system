<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:26px 24px;font-family:var(--font-display)}
  .m{font-size:22px;font-weight:800;letter-spacing:-0.02em;color:var(--fg-1);margin:0 0 12px}
  .m em{font-style:normal;color:var(--orange-500)}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .pill{font-size:12px;font-family:var(--font-body);color:var(--fg-2);border:1px solid var(--border);border-radius:9999px;padding:6px 14px;background:var(--bg-surface)}
</style></head><body>
  <p class="m">Set it. <em>Bloqr it.</em> Forget it.</p>
  <div class="row">
    <span class="pill">Bring your own. Or use ours.</span>
    <span class="pill">The privacy you didn't know you needed.</span>
    <span class="pill">Browsing Hygiene</span>
  </div>
</body></html>
