<!-- @dsCard group="Type" viewport="700x180" name="Display — Space Grotesk" subtitle="Headings & UI. Weight 800, tracking -0.03em." -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:24px}
  .hero{font-family:var(--font-display);font-size:44px;font-weight:800;letter-spacing:-0.03em;line-height:1.05;color:var(--fg-1)}
  .hero em{font-style:normal;background:linear-gradient(135deg,#FF5500,#FF8833);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sec{font-family:var(--font-display);font-size:24px;font-weight:800;letter-spacing:-0.03em;color:var(--fg-1);margin-top:10px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-top:10px}
</style></head><body>
  <div class="hero">Internet Hygiene:<br><em>Automated.</em></div>
  <div class="sec">Configure, compile, deploy.</div>
  <div class="meta">Space Grotesk · 400 / 500 / 600 / 700 · self-hosted variable font</div>
</body></html>
