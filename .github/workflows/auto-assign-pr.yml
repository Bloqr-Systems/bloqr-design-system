name: Auto-assign PR

on:
  pull_request:
    types: [opened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - name: Assign reviewers
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-reviewer "@Bloqr-Systems/bloqr-ai-admins"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Set milestone
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --milestone "launch"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Add to project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/Bloqr-Systems/projects/7
          github-token: ${{ secrets.GITHUB_TOKEN }}
