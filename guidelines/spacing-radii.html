<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="8 buttons · 12 cards · 16 panels · full pills." -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-mono);display:flex;gap:18px;align-items:center}
  .col{text-align:center}
  .b{width:72px;height:72px;background:var(--bg-surface);border:1px solid var(--border-accent);border-top:2px solid var(--orange-500)}
  .l{font-size:10px;color:var(--fg-3);margin-top:8px;display:block}
</style></head><body>
  <div class="col"><div class="b" style="border-radius:4px"></div><span class="l">sm · 4</span></div>
  <div class="col"><div class="b" style="border-radius:8px"></div><span class="l">md · 8</span></div>
  <div class="col"><div class="b" style="border-radius:12px"></div><span class="l">lg · 12</span></div>
  <div class="col"><div class="b" style="border-radius:16px"></div><span class="l">xl · 16</span></div>
  <div class="col"><div class="b" style="border-radius:24px"></div><span class="l">2xl · 24</span></div>
  <div class="col"><div class="b" style="border-radius:9999px"></div><span class="l">full</span></div>
</body></html>
