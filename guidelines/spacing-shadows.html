<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows & glows" subtitle="Black depth tiers + orange/cyan accent glows." -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:32px 24px;font-family:var(--font-mono);display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .col{text-align:center}
  .b{width:90px;height:64px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px}
  .l{font-size:10px;color:var(--fg-3);margin-top:12px;display:block}
</style></head><body>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-sm)"></div><span class="l">shadow-sm</span></div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-md)"></div><span class="l">shadow-md</span></div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-lg)"></div><span class="l">shadow-lg</span></div>
  <div class="col"><div class="b" style="box-shadow:var(--glow-cta);border-color:var(--orange-500)"></div><span class="l">glow · orange</span></div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-cyan);border-color:var(--cyan-500)"></div><span class="l">glow · cyan</span></div>
</body></html>
