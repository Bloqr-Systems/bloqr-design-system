<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-mono);display:flex;gap:14px}
  .sw{flex:1;border-radius:10px;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;height:96px}
  .n{font-size:11px;color:#070B14;font-weight:700}.h{font-size:10px;color:#070B14;opacity:.75}
</style></head><body>
  <div class="sw" style="background:#22C55E"><span class="n">success</span><span class="h">#22C55E</span></div>
  <div class="sw" style="background:#F59E0B"><span class="n">warning</span><span class="h">#F59E0B</span></div>
  <div class="sw" style="background:#EF4444"><span class="n">error</span><span class="h">#EF4444</span></div>
  <div class="sw" style="background:#00D4FF"><span class="n">info</span><span class="h">#00D4FF</span></div>
</body></html>
