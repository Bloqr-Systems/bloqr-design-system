<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-display)}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange-500);margin-bottom:16px}
  .row{display:flex;align-items:baseline;gap:14px;color:var(--fg-1);margin-bottom:2px}
  .row .tok{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);width:120px;flex-shrink:0}
  .s{font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
</style></head><body>
  <div class="eyebrow">The problem · eyebrow 11px</div>
  <div class="row"><span class="tok">text-5xl · 48</span><span class="s" style="font-size:48px">Aa</span></div>
  <div class="row"><span class="tok">text-4xl · 36</span><span class="s" style="font-size:36px">Aa</span></div>
  <div class="row"><span class="tok">text-2xl · 24</span><span class="s" style="font-size:24px">Aa</span></div>
  <div class="row"><span class="tok">text-lg · 18</span><span class="s" style="font-size:18px">The quick brown fox</span></div>
  <div class="row"><span class="tok">text-base · 16</span><span class="s" style="font-size:16px;font-weight:400">The quick brown fox jumps</span></div>
</body></html>
